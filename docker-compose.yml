services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  trading-swarm:
    build:
      context: .
      dockerfile: packages/trading_swarm/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      MODEL_DIR: /data/models/pm
      PAPER_BANKROLL: ${PAPER_BANKROLL:-10000}
      LIVE_BANKROLL: ${LIVE_BANKROLL:-2000}
    volumes:
      - ./data/models/pm:/data/models/pm:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  redis_data:
