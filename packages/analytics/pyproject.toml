[project]
name = "sharpedge-analytics"
version = "0.1.0"
description = "Advanced analytics calculations for SharpEdge"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.0",
    "scipy>=1.14",
    "matplotlib>=3.8",
    "sharpedge-shared",
]

[tool.uv.sources]
sharpedge-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sharpedge_analytics"]
