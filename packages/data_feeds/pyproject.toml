[project]
name = "sharpedge-feeds"
version = "0.1.0"
description = "External data feed clients for SharpEdge"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "websockets>=12.0",
    "pydantic>=2.0",
    "cryptography>=42.0",
    "sharpedge-shared",
    "sharpedge-analytics",
]

[tool.uv.sources]
sharpedge-shared = { workspace = true }
sharpedge-analytics = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sharpedge_feeds"]
