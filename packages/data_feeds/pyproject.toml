[project]
name = "sharpedge-feeds"
version = "0.1.0"
description = "External data feed clients for SharpEdge"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "sharpedge-shared",
    "sharpedge-analytics",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sharpedge_feeds"]
