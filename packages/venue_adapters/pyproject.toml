[project]
name = "sharpedge-venue-adapters"
version = "0.1.0"
description = "Canonical multi-venue adapter layer for SharpEdge"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "numpy>=1.26",
    "scipy>=1.13",
    "sharpedge-feeds",
    "sharpedge-models",
    "sharpedge-shared",
]

[tool.uv.sources]
sharpedge-feeds = { workspace = true }
sharpedge-models = { workspace = true }
sharpedge-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sharpedge_venue_adapters"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
