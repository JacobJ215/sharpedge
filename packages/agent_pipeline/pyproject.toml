[project]
name = "sharpedge-agent-pipeline"
version = "0.1.0"
description = "SharpEdge agent pipeline - LangGraph StateGraph orchestration"
requires-python = ">=3.12"
dependencies = [
    "langgraph>=1.1.0,<2",
    "langchain-openai>=0.3.0,<0.4",
    "langgraph-checkpoint-postgres>=3.0.0,<4",
    "tiktoken>=0.12.0,<1",
    "sharpedge-models",
    "sharpedge-analytics",
    "sharpedge-db",
    "sharpedge-odds",
    "sharpedge-shared",
    "sharpedge-feeds",
]

[tool.uv.sources]
sharpedge-models = { workspace = true }
