target-version = "py312"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "T20",  # flake8-print
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line length handled by formatter
]

[lint.isort]
known-first-party = [
    "sharpedge_bot",
    "sharpedge_webhooks",
    "sharpedge_db",
    "sharpedge_models",
    "sharpedge_odds",
    "sharpedge_shared",
]

[format]
quote-style = "double"
indent-style = "space"
